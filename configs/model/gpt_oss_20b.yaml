# @package base_llm
# Base LLM: OpenAI GPT-OSS-20B (GptOssForCausalLM, MoE)

name: openai/gpt-oss-20b
model_class: BASE_LLM
model_type: GPT_OSS
device: cuda
load_in_8bit: false
load_in_4bit: false
torch_dtype: bfloat16
trust_remote_code: true
max_memory: null
hidden_size: 2880
num_hidden_layers: 24

# Generation parameters
max_new_tokens: 8192
temperature: null
top_p: null
top_k: null
repetition_penalty: null
no_repeat_ngram_size: null
do_sample: null
num_return_sequences: 8
return_hidden_states: true
return_logits: false

# vLLM settings
vllm_gpu_memory_utilization: 0.92
