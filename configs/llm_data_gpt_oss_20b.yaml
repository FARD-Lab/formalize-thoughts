# Main configuration for dataset curation — OpenAI GPT-OSS-20B

defaults:
  - model: gpt_oss_20b
  - loader: bbeh
  - logging: default
  - _self_

# Experiment tracking
experiment_name: llm_data_gpt_oss_20b
run_name: llm_data_gpt_oss_20b

# Reproducibility
seed: 42

# Checkpoint
resume_from_checkpoint: null

# LLM data specific settings
output_dir: ./outputs/llm_data_gpt_oss_20b
max_input_length: 8192
batch_size: 1
save_format: jsonl
shard_size: 1024

base_llm:
  inference_backend: transformers

# WandB configuration
wandb:
  use_wandb: false
  project: hidden-thoughts
  entity: null
  name: null
  tags: []
  notes: null
  config: null
  mode: online
  resume: null
